<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KING BET | Premium VIP Network</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --p-red: #ff0000;
            --gold: #ffd700;
            --bg: #050505;
            --card: #121212;
            --border: #222;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #27ae60;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; padding-left: 110px; min-height: 100vh; overflow-x: hidden; }

        /* --- UI COMPONENTS --- */
        header {
            height: 90px; background: #000; display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; border-bottom: 3px solid var(--p-red); position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }
        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 32px; color: var(--p-red); cursor: pointer; text-shadow: 0 0 15px rgba(255,0,0,0.5); }
        .bal-display { 
            background: linear-gradient(90deg, #111, #222); border: 2px solid var(--gold); 
            padding: 12px 25px; border-radius: 15px; font-weight: 900; color: var(--gold); font-size: 20px;
        }

        /* --- NAVIGATION --- */
        nav { 
            position: fixed; left: 0; top: 0; width: 110px; height: 100vh; background: #000; 
            border-right: 2px solid var(--p-red); display: flex; flex-direction: column; justify-content: center; z-index: 2000; 
        }
        .nav-item { 
            color: #777; text-align: center; font-size: 11px; cursor: pointer; padding: 22px 0; 
            transition: 0.3s; text-transform: uppercase; font-weight: 700; position: relative; 
        }
        .nav-item i { font-size: 30px; display: block; margin-bottom: 8px; }
        .nav-item.active { color: #fff; background: rgba(255,0,0,0.1); border-left: 5px solid var(--p-red); }
        .badge { 
            position: absolute; top: 12px; right: 15px; background: var(--p-red); color: white; 
            border-radius: 50%; width: 22px; height: 22px; font-size: 11px; line-height: 22px; display: none; font-weight: 900; 
        }

        /* --- SCREENS --- */
        .screen { display: none; padding: 40px; animation: slideIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-family: 'Orbitron'; color: var(--gold); margin-bottom: 30px; border-left: 6px solid var(--p-red); padding-left: 15px; font-size: 22px; }

        /* --- GAME CARDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 25px; }
        .game-card { 
            background: var(--card); height: 200px; border-radius: 30px; border: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; position: relative;
        }
        .game-card:hover { border-color: var(--p-red); transform: translateY(-8px); box-shadow: 0 10px 30px rgba(255,0,0,0.2); }
        .game-card i { font-size: 55px; color: var(--gold); margin-bottom: 15px; }
        .status-tag { position: absolute; top: 15px; right: 15px; background: var(--p-red); font-size: 10px; padding: 3px 10px; border-radius: 8px; font-weight: 900; }

        /* --- FORMS & HISTORY --- */
        .box { max-width: 650px; margin: 0 auto; background: #0a0a0a; padding: 40px; border-radius: 35px; border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .info { background: #111; padding: 20px; border-radius: 20px; margin-bottom: 30px; border: 1px dashed var(--gold); text-align: center; }
        input, select { width: 100%; padding: 20px; margin-bottom: 25px; border-radius: 18px; background: #151515; border: 1px solid #333; color: #fff; font-size: 16px; outline: none; }
        .btn-big { width: 100%; padding: 22px; background: var(--p-red); border: none; border-radius: 20px; color: #fff; font-weight: 900; font-size: 20px; cursor: pointer; text-transform: uppercase; }

        .log-item { background: #111; padding: 20px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .st-PENDING { color: var(--gold); }
        .st-APPROVED { color: var(--success); }
        .st-REJECTED { color: var(--p-red); }

        /* --- ADMIN REQUESTS --- */
        .admin-box { background: #fff; color: #000; padding: 30px; border-radius: 30px; margin-bottom: 25px; border-left: 15px solid var(--p-red); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .admin-box h3 { font-size: 22px; font-weight: 900; border-bottom: 2px solid #eee; margin-bottom: 15px; padding-bottom: 10px; }
        .admin-btn-row { display: flex; gap: 15px; margin-top: 25px; }
        .btn-yes { background: var(--success); color: #fff; flex: 1; padding: 18px; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; }
        .btn-no { background: var(--p-red); color: #fff; flex: 1; padding: 18px; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; }

        /* --- AVIATOR ENGINE --- */
        #aviator-modal { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; }
        .avi-header { padding: 20px 30px; display: flex; justify-content: space-between; background: #0a0a0a; border-bottom: 2px solid #222; }
        .avi-graph { flex: 1; position: relative; overflow: hidden; background: radial-gradient(circle at bottom left, rgba(255,0,0,0.15), transparent); display: flex; align-items: center; justify-content: center; }
        #multiplier { font-size: 120px; font-weight: 900; color: var(--gold); text-shadow: 0 0 40px rgba(255,215,0,0.4); }
        #plane { position: absolute; bottom: 20%; left: 10%; font-size: 70px; color: var(--p-red); transition: 0.1s linear; text-shadow: 0 0 30px red; }
        
        .avi-controls { padding: 30px; background: #080808; border-top: 3px solid #1a1a1a; display: flex; flex-direction: column; align-items: center; }
        .bet-chips { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 450px; margin-bottom: 15px; }
        .chip { background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; text-align: center; }
        .chip:hover { background: var(--gold); color: #000; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 900px) {
            body { padding-left: 0; padding-bottom: 110px; }
            nav { bottom: 0; top: auto; width: 100%; height: 100px; flex-direction: row; border-right: none; border-top: 3px solid var(--p-red); }
            .nav-item { flex: 1; font-size: 10px; }
            header { padding: 0 20px; }
            .logo { font-size: 24px; }
            .screen { padding: 25px; }
            #multiplier { font-size: 80px; }
        }
    </style>
</head>
<body onload="initApp()">

    <header>
        <div class="logo" onclick="adminAccess()">KING BET</div>
        <div class="bal-display">Rs <span id="user-bal">0</span></div>
    </header>

    <nav>
        <div class="nav-item active" onclick="show('home', this)"><i class="fa fa-th-large"></i>Home</div>
        <div class="nav-item" onclick="show('deposit', this)"><i class="fa fa-plus-circle"></i>Deposit</div>
        <div class="nav-item" onclick="show('withdraw', this)"><i class="fa fa-minus-circle"></i>Withdraw</div>
        <div class="nav-item" onclick="show('history', this)"><i class="fa fa-history"></i>History</div>
        <div class="nav-item" onclick="show('profile', this)"><i class="fa fa-user-circle"></i>Profile</div>
        <div id="adm-nav" class="nav-item" style="display:none;" onclick="show('admin', this)">
            <span id="adm-count" class="badge">0</span>
            <i class="fa fa-shield-alt"></i>Admin
        </div>
    </nav>

    <div class="container">
        <div id="screen-home" class="screen active">
            <h2 class="section-title">LIVE GAMES</h2>
            <div class="grid">
                <div class="game-card" onclick="openAviator()">
                    <div class="status-tag">HOT</div>
                    <i class="fa fa-plane-departure"></i>
                    <span style="font-weight:900; font-size:18px;">AVIATOR</span>
                </div>
                <div class="game-card" onclick="alert('Maintenance...')"><i class="fa fa-dice"></i><span>LUDO PREM</span></div>
                <div class="game-card" onclick="alert('Opening Soon')"><i class="fa fa-cards"></i><span>3 PATTI</span></div>
            </div>
        </div>

        <div id="screen-deposit" class="screen">
            <div class="box">
                <h2 style="text-align:center; margin-bottom:20px;">FUNDS DEPOSIT</h2>
                <div class="info">
                    <p style="color:#888;">EASYPAISA AGENT:</p>
                    <h3 style="color:var(--gold); font-size:30px; cursor:pointer;" onclick="copyNum()">03182452810</h3>
                    <small>(Tap to Copy Number)</small>
                </div>
                <input type="text" id="d-acc" placeholder="Sender Name">
                <input type="text" id="d-tid" placeholder="Transaction ID (TID)">
                <input type="number" id="d-amt" placeholder="Amount (Min 100)">
                <button class="btn-big" onclick="submitDep()">SUBMIT REQUEST</button>
            </div>
        </div>

        <div id="screen-withdraw" class="screen">
            <div class="box">
                <h2 style="text-align:center; margin-bottom:20px;">WITHDRAWAL</h2>
                <select id="w-bank"><option>EasyPaisa</option><option>JazzCash</option></select>
                <input type="text" id="w-name" placeholder="Account Name">
                <input type="number" id="w-num" placeholder="Account Number">
                <input type="number" id="w-amt" placeholder="Amount (Min 500)">
                <button class="btn-big" style="background:var(--success);" onclick="submitWit()">WITHDRAW NOW</button>
            </div>
        </div>

        <div id="screen-history" class="screen">
            <h2 class="section-title">TRANSACTION HISTORY</h2>
            <div id="history-list">
                <p style="text-align:center; color:#555; padding:50px;">No records yet.</p>
            </div>
        </div>

        <div id="screen-profile" class="screen">
            <div style="background:linear-gradient(135deg, #111, #1a1a1a); padding:60px; border-radius:40px; text-align:center; border:1px solid #333;">
                <div style="width:110px; height:110px; background:var(--p-red); border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:50px;">
                    <i class="fa fa-user"></i>
                </div>
                <h1 id="prof-bal" style="font-size:50px; color:var(--gold); margin-bottom:10px;">Rs 0</h1>
                <p style="color:#777; font-weight:800;">ID: <span id="prof-uid" style="color:#fff;">---</span></p>
                <button class="btn-big" style="margin-top:40px; background:#444;" onclick="logout()">LOGOUT</button>
            </div>
        </div>

        <div id="screen-admin" class="screen">
            <h2 style="color:red; font-family:'Orbitron'; margin-bottom:30px;"><i class="fa fa-user-shield"></i> MASTER CONTROL</h2>
            <div id="admin-list"></div>
        </div>
    </div>

    <div id="aviator-modal">
        <div class="avi-header">
            <div style="color:var(--gold); font-family:'Orbitron'; font-weight:900;">AVIATOR LIVE</div>
            <div style="cursor:pointer; font-size:40px;" onclick="closeAviator()">×</div>
        </div>
        <div class="avi-graph">
            <div id="multiplier">1.00x</div>
            <i class="fa fa-plane" id="plane"></i>
        </div>
        <div class="avi-controls">
            <div class="bet-chips">
                <div class="chip" onclick="setBet(10)">10</div>
                <div class="chip" onclick="setBet(50)">50</div>
                <div class="chip" onclick="setBet(100)">100</div>
                <div class="chip" onclick="setBet(500)">500</div>
                <div class="chip" onclick="setBet(1000)">1000</div>
                <div class="chip" onclick="setBet(5000)">5000</div>
            </div>
            <div style="width:100%; max-width:450px;">
                <input type="number" id="avi-bet-val" placeholder="Amount" style="text-align:center; border:2px solid var(--gold);">
                <button id="avi-start" class="btn-big" style="background:var(--success);" onclick="aviFly()">PLACE BET</button>
                <button id="avi-cash" class="btn-big" style="display:none; background:var(--gold); color:#000;" onclick="aviCashout()">CASHOUT</button>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyC4a0fl2BV4lItZzIqZPF3zgUqggzUXS2I",
            authDomain: "kingbet-6b8a3.firebaseapp.com",
            databaseURL: "https://kingbet-6b8a3-default-rtdb.firebaseio.com",
            projectId: "kingbet-6b8a3",
            storageBucket: "kingbet-6b8a3.firebasestorage.app",
            messagingSenderId: "1029027971304",
            appId: "1:1029027971304:web:738c9739e5927f1837095d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- STATE ---
        let UID = localStorage.getItem('kb_uid') || 'U-' + Math.floor(Math.random()*900000+100000);
        localStorage.setItem('kb_uid', UID);
        let myBal = 0;
        let isFlying = false, currentMult = 1.0, betAmt = 0, timer;

        function initApp() {
            document.getElementById('prof-uid').innerText = UID;
            
            // Sync Balance
            db.ref('users/'+UID+'/balance').on('value', (s) => {
                myBal = s.val() || 0;
                document.getElementById('user-bal').innerText = myBal.toLocaleString();
                document.getElementById('prof-bal').innerText = "Rs " + myBal.toLocaleString();
            });

            // Sync History
            db.ref('requests').on('value', (snap) => {
                const list = document.getElementById('history-list');
                list.innerHTML = "";
                let count = 0;
                snap.forEach(child => {
                    const r = child.val();
                    if(r.uid === UID) {
                        count++;
                        list.insertAdjacentHTML('afterbegin', `
                            <div class="log-item">
                                <div><b>${r.type}</b><br><small>${r.date}</small></div>
                                <div class="st-${r.status}">Rs ${r.amount} <br> ${r.status}</div>
                            </div>
                        `);
                    }
                });
                if(count === 0) list.innerHTML = '<p style="text-align:center;padding:50px;">No History.</p>';
            });

            // Admin Sync
            if(localStorage.getItem('kb_admin') === 'true') {
                document.getElementById('adm-nav').style.display = 'block';
                syncAdmin();
            }
        }

        function show(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-'+id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        // --- ACTIONS ---
        function submitDep() {
            let n = document.getElementById('d-acc').value;
            let t = document.getElementById('d-tid').value;
            let a = parseInt(document.getElementById('d-amt').value);
            if(!n || !t || a < 100) return alert("Error!");
            db.ref('requests').push().set({ uid:UID, name:n, tid:t, amount:a, type:'DEPOSIT', status:'PENDING', date:new Date().toLocaleString() });
            alert("Sent!"); show('history');
        }

        function submitWit() {
            let a = parseInt(document.getElementById('w-amt').value);
            if(a > myBal || a < 500) return alert("Low Balance!");
            db.ref('users/'+UID).update({ balance: myBal - a });
            db.ref('requests').push().set({ 
                uid:UID, name:document.getElementById('w-name').value, 
                num:document.getElementById('w-num').value, amount:a, type:'WITHDRAW', status:'PENDING', date:new Date().toLocaleString() 
            });
            alert("Withdrawal Sent!"); show('history');
        }

        // --- AVIATOR ENGINE ---
        function openAviator() { document.getElementById('aviator-modal').style.display = 'flex'; }
        function closeAviator() { if(!isFlying) document.getElementById('aviator-modal').style.display = 'none'; }
        function setBet(val) { document.getElementById('avi-bet-val').value = val; }

        function aviFly() {
            betAmt = parseInt(document.getElementById('avi-bet-val').value);
            if(betAmt < 10 || betAmt > myBal) return alert("Balance?");

            db.ref('users/'+UID).update({ balance: myBal - betAmt });
            isFlying = true; currentMult = 1.0;
            document.getElementById('avi-start').style.display = 'none';
            document.getElementById('avi-cash').style.display = 'block';
            document.getElementById('multiplier').style.color = "var(--gold)";

            let crashPoint = (Math.random() * 4.5 + 1.01).toFixed(2);
            timer = setInterval(() => {
                currentMult += 0.05;
                document.getElementById('multiplier').innerText = currentMult.toFixed(2) + "x";
                let p = document.getElementById('plane');
                p.style.bottom = (20 + (currentMult-1)*40) + "%";
                p.style.left = (10 + (currentMult-1)*15) + "%";

                if(currentMult >= crashPoint) {
                    clearInterval(timer); isFlying = false;
                    document.getElementById('multiplier').innerText = "FLEW AWAY!";
                    document.getElementById('multiplier').style.color = "red";
                    setTimeout(resetAvi, 2000);
                }
            }, 100);
        }

        function aviCashout() {
            if(!isFlying) return;
            clearInterval(timer); isFlying = false;
            let win = Math.floor(betAmt * currentMult);
            db.ref('users/'+UID).update({ balance: myBal + win });
            document.getElementById('multiplier').innerText = "WIN Rs " + win;
            document.getElementById('multiplier').style.color = "var(--success)";
            setTimeout(resetAvi, 2000);
        }

        function resetAvi() {
            document.getElementById('avi-start').style.display = 'block';
            document.getElementById('avi-cash').style.display = 'none';
            document.getElementById('multiplier').innerText = "1.00x";
            document.getElementById('plane').style.bottom = "20%";
            document.getElementById('plane').style.left = "10%";
        }

        // --- ADMIN ---
        function adminAccess() {
            if(prompt("PIN:") === "ayaz786") {
                localStorage.setItem('kb_admin', 'true');
                location.reload();
            }
        }

        function syncAdmin() {
            db.ref('requests').on('value', (snap) => {
                const list = document.getElementById('admin-list');
                list.innerHTML = "";
                let count = 0;
                snap.forEach(child => {
                    const r = child.val();
                    if(r.status === 'PENDING') {
                        count++;
                        list.insertAdjacentHTML('afterbegin', `
                            <div class="admin-box">
                                <h3>${r.type} - Rs ${r.amount}</h3>
                                <p>User: ${r.uid} | ${r.name}</p>
                                <p>Details: ${r.tid || r.num}</p>
                                <div class="admin-btn-row">
                                    <button class="btn-yes" onclick="approve('${child.key}','${r.uid}',${r.amount},'${r.type}')">APPROVE</button>
                                    <button class="btn-no" onclick="reject('${child.key}','${r.uid}',${r.amount},'${r.type}')">REJECT</button>
                                </div>
                            </div>
                        `);
                    }
                });
                document.getElementById('adm-count').innerText = count;
                document.getElementById('adm-count').style.display = count > 0 ? 'block' : 'none';
            });
        }

        function approve(k, u, a, t) {
            if(t==='DEPOSIT') db.ref('users/'+u+'/balance').transaction(c => (c||0)+a);
            db.ref('requests/'+k).update({ status: 'APPROVED' });
        }
        function reject(k, u, a, t) {
            if(t==='WITHDRAW') db.ref('users/'+u+'/balance').transaction(c => (c||0)+a);
            db.ref('requests/'+k).update({ status: 'REJECTED' });
        }

        function copyNum() { navigator.clipboard.writeText("03182452810"); alert("Copied!"); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
