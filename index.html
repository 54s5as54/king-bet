<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING BET | Master Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --netflix-red: #E50914; --black-pure: #000000; --text-white: #ffffff; 
            --green: #46d369; --gold: #ffd700; --gray: #808080;
            --bg-home: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            --bg-board: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --bg-depo: linear-gradient(135deg, #1d976c, #93f9b9);
            --bg-notif: linear-gradient(135deg, #4568dc, #b06ab3);
            --bg-wit: linear-gradient(135deg, #373b44, #4286f4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--black-pure); color: var(--text-white); padding-left: 110px; overflow-x: hidden; }
        header { background: rgba(0,0,0,0.9); padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 4px solid var(--netflix-red); }
        .logo-text { font-weight: 900; font-size: 30px; color: var(--netflix-red); text-transform: uppercase; cursor: pointer; }
        .bal-val { background: rgba(255, 215, 0, 0.1); border: 2px solid var(--gold); color: var(--gold); padding: 8px 20px; border-radius: 50px; font-weight: 800; font-size: 18px; }
        nav { position: fixed; left: 0; top: 0; width: 110px; height: 100vh; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; justify-content: space-around; padding: 40px 0; border-right: 3px solid var(--netflix-red); z-index: 2000; }
        .nav-link { color: var(--gray); text-align: center; font-size: 12px; cursor: pointer; transition: 0.3s; font-weight: 600; position: relative; }
        .nav-link i { font-size: 28px !important; display: block; margin-bottom: 8px; }
        .nav-link.active { color: var(--text-white); background: rgba(229, 9, 20, 0.1); }
        .badge { position: absolute; top: 5px; right: 20px; background: var(--netflix-red); color: white; font-size: 11px; padding: 3px 7px; border-radius: 50%; font-weight: 900; display: none; border: 2px solid white; }
        .screen { display: none; min-height: 100vh; padding: 30px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .active { display: block; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; margin-top: 30px; }
        .game-card { background: rgba(255,255,255,0.05); height: 150px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .game-card i { font-size: 45px; margin-bottom: 15px; color: var(--gold); }
        input, select { width: 100%; padding: 16px; border-radius: 15px; border: 2px solid #ddd; background: #fff; color: #000; font-weight: 600; margin-bottom: 15px; }
        .btn-main { width: 100%; padding: 20px; background: var(--black-pure); color: #fff; border: 2px solid #fff; border-radius: 15px; font-weight: 900; cursor: pointer; }
        .game-ov { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #history-bar { width: 95%; max-width: 500px; display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 15px; min-height: 55px; }
        .hist-item { padding: 6px 15px; border-radius: 8px; font-size: 13px; font-weight: 800; white-space: nowrap; }
        .hist-win { background: var(--green); color: black; }
        .hist-loss { background: var(--netflix-red); color: white; }
        #game-area { position: relative; width: 100%; height: 400px; border-bottom: 3px dashed #333; margin-bottom: 20px; overflow: hidden; }
        #plane-icon { position: absolute; bottom: 20px; left: 10%; font-size: 50px; color: var(--netflix-red); text-shadow: 0 0 25px red; z-index: 5; }
        #mult-text { font-size: 90px; font-weight: 900; color: var(--gold); z-index: 10; position: absolute; top: 40%; width: 100%; text-align: center; }
        .quick-bet-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .q-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .req-card { background: #fff; color: #222; padding: 20px; border-radius: 20px; margin-bottom: 20px; border-left: 10px solid var(--netflix-red); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .adm-btn-row { display: flex; gap: 15px; margin-top: 20px; }
        .btn-approve { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 12px; flex: 1; font-weight: 900; cursor: pointer; }
        .btn-reject { background: #e74c3c; color: white; border: none; padding: 15px; border-radius: 12px; flex: 1; font-weight: 900; cursor: pointer; }
        .notif-item { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--gold); }
        @media (max-width: 800px) {
            body { padding-left: 0; padding-bottom: 120px; }
            nav { left: 0; top: auto; bottom: 0; width: 100%; height: 100px; flex-direction: row; border-right: none; border-top: 4px solid var(--netflix-red); padding: 0; }
            .nav-link { flex: 1; font-size: 10px; }
            header { padding: 12px 15px; }
        }
    </style>
</head>
<body onload="init()">

    <header>
        <div class="logo-text" onclick="askAdmin()">KING BET</div>
        <div class="bal-val">Rs <span id="user-bal">0</span></div>
    </header>

    <div id="scr-profile" class="screen" style="background:var(--bg-board);">
        <h2>💎 BOARD</h2>
        <div style="background:rgba(255,255,255,0.05); padding:50px 20px; border-radius:30px; text-align:center; border: 2px solid rgba(255,255,255,0.2); margin-top:20px;">
            <p>Your Balance</p>
            <h1 id="stat-bal" style="font-size:60px; color:var(--gold);">Rs 0</h1>
            <div style="background:var(--green); color:black; padding:8px 20px; border-radius:50px; font-weight:900; display:inline-block; margin-top:10px;">VIP ONLINE</div>
        </div>
    </div>

    <div id="scr-deposit" class="screen" style="background:var(--bg-depo); color:#000;">
        <h2>💰 DEPOSIT</h2>
        <div style="background:#fff; padding:20px; border-radius:20px; margin-top:20px;">
            <p onclick="copyNum()" style="background:#f0f0f0; padding:15px; border-radius:10px; text-align:center; border:2px dashed #000; margin-bottom:15px;">Admin: <b>03182452810</b> (Tap to copy)</p>
            <input type="text" id="dep-name" placeholder="Customer Name">
            <input type="text" id="dep-bank" placeholder="Bank Name (EasyPaisa/JazzCash)">
            <input type="text" id="dep-tid" placeholder="Transaction ID (TID)">
            <input type="number" id="dep-amt" placeholder="Amount (PKR)">
            <button class="btn-main" onclick="sendDep()">SUBMIT DEPOSIT</button>
        </div>
    </div>

    <div id="scr-home" class="screen active" style="background:var(--bg-home);">
        <h2>🔥 GAMES</h2>
        <div class="game-grid">
            <div class="game-card" onclick="openCrash()"><i class="fa fa-plane"></i>AVIATOR</div>
            <div class="game-card" onclick="alert('Coming Soon')"><i class="fa fa-suit-spades"></i>3 PATTI</div>
            <div class="game-card" onclick="alert('Coming Soon')"><i class="fa fa-dragon"></i>TIGER</div>
            <div class="game-card" onclick="alert('Coming Soon')"><i class="fa fa-dice"></i>DICE</div>
        </div>
    </div>

    <div id="scr-notif" class="screen" style="background:var(--bg-notif);">
        <h2>🔔 ALERTS</h2>
        <div id="notif-list" style="margin-top:20px;"></div>
    </div>

    <div id="scr-withdraw" class="screen" style="background:var(--bg-wit);">
        <h2>💸 WITHDRAW</h2>
        <div style="background:rgba(255,255,255,0.1); padding:20px; border-radius:20px;">
            <select id="wit-bank"><option>EasyPaisa</option><option>JazzCash</option></select>
            <input type="text" id="wit-name" placeholder="Account Holder Name">
            <input type="number" id="wit-num" placeholder="Account Number">
            <input type="number" id="wit-amt" placeholder="Amount">
            <button class="btn-main" style="background:var(--gold); color:#000; border:none;" onclick="sendWit()">WITHDRAW NOW</button>
        </div>
    </div>

    <div id="scr-admin" class="screen" style="background:#f0f2f5; color:#000;">
        <h2>👑 ADMIN PANEL</h2>
        <div id="admin-list" style="margin-top:20px;"></div>
    </div>

    <div id="crash-ui" class="game-ov">
        <div style="position:absolute; top:25px; right:25px; font-size:45px; cursor:pointer;" onclick="closeCrash()">×</div>
        <div id="history-bar"></div>
        <div id="game-area">
            <div id="mult-text">1.00x</div>
            <i class="fa fa-plane" id="plane-icon"></i>
        </div>
        <div style="width:90%; max-width:400px; padding:20px; background:rgba(255,255,255,0.05); border-radius:25px;">
            <input type="number" id="bet-amt" placeholder="Amount" style="text-align:center; font-size:20px; border:2px solid var(--gold);">
            <div class="quick-bet-grid">
                <button class="q-btn" onclick="setB(60)">60</button><button class="q-btn" onclick="setB(100)">100</button><button class="q-btn" onclick="setB(500)">500</button>
            </div>
            <button id="btn-start" class="btn-main" onclick="startG()">PLACE BET</button>
            <button id="btn-cash" class="btn-main" style="display:none; background:var(--green); border:none; color:#000;" onclick="cashG()">CASHOUT</button>
        </div>
    </div>

    <nav>
        <div class="nav-link" onclick="tab('scr-profile', this)"><i class="fa fa-crown"></i>Board</div>
        <div class="nav-link" onclick="tab('scr-deposit', this)"><i class="fa fa-plus-circle"></i>Deposit</div>
        <div class="nav-link active" onclick="tab('scr-home', this)"><i class="fa fa-gamepad"></i>Home</div>
        <div class="nav-link" onclick="tab('scr-notif', this)"><span id="n-badge" class="badge">0</span><i class="fa fa-bell"></i>Notif</div>
        <div class="nav-link" onclick="tab('scr-withdraw', this)"><i class="fa fa-wallet"></i>Withdraw</div>
        <div id="nav-admin" class="nav-link" style="display:none;" onclick="tab('scr-admin', this)"><span id="a-badge" class="badge">0</span><i class="fa fa-user-shield"></i>Admin</div>
    </nav>

    <script>
        let bal = 0, isLive = false, mult = 1.0, bet = 0, timer, nUnread = 0, aUnread = 0;

        function init() {
            bal = parseInt(localStorage.getItem('kb_bal')) || 0;
            document.getElementById('notif-list').innerHTML = localStorage.getItem('kb_notifs') || "";
            document.getElementById('history-bar').innerHTML = localStorage.getItem('kb_hist') || "";
            document.getElementById('admin-list').innerHTML = localStorage.getItem('kb_admin_reqs') || "";
            refresh();
        }

        function save() {
            localStorage.setItem('kb_bal', bal);
            localStorage.setItem('kb_notifs', document.getElementById('notif-list').innerHTML);
            localStorage.setItem('kb_hist', document.getElementById('history-bar').innerHTML);
            localStorage.setItem('kb_admin_reqs', document.getElementById('admin-list').innerHTML);
        }

        function refresh() {
            document.getElementById('user-bal').innerText = bal;
            document.getElementById('stat-bal').innerText = "Rs " + bal;
            document.getElementById('n-badge').innerText = nUnread;
            document.getElementById('n-badge').style.display = nUnread > 0 ? 'block' : 'none';
            document.getElementById('a-badge').innerText = aUnread;
            document.getElementById('a-badge').style.display = aUnread > 0 ? 'block' : 'none';
        }

        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            if(id === 'scr-notif') nUnread = 0;
            if(id === 'scr-admin') aUnread = 0;
            refresh();
        }

        function notify(t, m) {
            nUnread++;
            document.getElementById('notif-list').insertAdjacentHTML('afterbegin', `<div class="notif-item"><b>${t}</b><p>${m}</p></div>`);
            save(); refresh();
        }

        function askAdmin() { if(prompt("Pin:") === "ayaz786") document.getElementById('nav-admin').style.display='block'; }
        function copyNum() { navigator.clipboard.writeText("03182452810"); alert("Copied!"); }
        function setB(v) { document.getElementById('bet-amt').value = v; }

        function sendDep() {
            let n = document.getElementById('dep-name').value, a = document.getElementById('dep-amt').value, t = document.getElementById('dep-tid').value;
            if(!n || !a || !t) return alert("Fill all!");
            let id = Date.now(); aUnread++;
            let html = `<div class="req-card" id="r-${id}"><b>💰 DEPOSIT</b><p>${n} | TID: ${t}</p><h3 style="color:green">Rs ${a}</h3>
            <div class="adm-btn-row"><button class="btn-approve" onclick="appDep(${a},${id})">Approve</button>
            <button class="btn-reject" onclick="rej(${id})">Reject</button></div></div>`;
            document.getElementById('admin-list').insertAdjacentHTML('afterbegin', html);
            notify("Deposit Sent", `Rs ${a} is pending.`); save(); refresh();
        }

        function sendWit() {
            let a = parseInt(document.getElementById('wit-amt').value), n = document.getElementById('wit-name').value;
            if(!a || a > bal) return alert("Low Balance!");
            bal -= a; aUnread++; let id = Date.now();
            let html = `<div class="req-card" id="r-${id}"><b>💸 WITHDRAW</b><p>${n}</p><h3 style="color:red">Rs ${a}</h3>
            <div class="adm-btn-row"><button class="btn-approve" onclick="appWit(${id})">Paid</button>
            <button class="btn-reject" onclick="rejWit(${a},${id})">Reject</button></div></div>`;
            document.getElementById('admin-list').insertAdjacentHTML('afterbegin', html);
            notify("Withdraw Sent", `Rs ${a} pending.`); save(); refresh();
        }

        function appDep(a, id) { bal += a; notify("Deposit Approved ✅", `Rs ${a} added.`); document.getElementById(`r-${id}`).remove(); save(); refresh(); }
        function appWit(id) { notify("Withdraw Paid ✅", "Funds sent!"); document.getElementById(`r-${id}`).remove(); save(); refresh(); }
        function rejWit(a, id) { bal += a; notify("Withdraw Rejected ❌", `Rs ${a} refunded.`); document.getElementById(`r-${id}`).remove(); save(); refresh(); }
        function rej(id) { notify("Request Rejected ❌", "Contact Admin."); document.getElementById(`r-${id}`).remove(); save(); refresh(); }

        function openCrash() { if(bal < 60) return alert("Min 60 Rs!"); document.getElementById('crash-ui').style.display='flex'; }
        function closeCrash() { if(isLive) return alert("Game running!"); document.getElementById('crash-ui').style.display='none'; }
        
        function startG() {
            bet = parseInt(document.getElementById('bet-amt').value);
            if(!bet || bet > bal || bet < 60) return alert("Invalid Bet!");
            bal -= bet; isLive = true; mult = 1.0; save(); refresh();
            document.getElementById('btn-start').style.display='none'; document.getElementById('btn-cash').style.display='block';
            let cp = (Math.random() * 3.5 + 1.1).toFixed(2);
            timer = setInterval(() => {
                mult += 0.05; document.getElementById('mult-text').innerText = mult.toFixed(2) + "x";
                let p = document.getElementById('plane-icon');
                p.style.bottom = (20 + (mult-1)*50) + "px"; p.style.left = (10 + (mult-1)*15) + "%";
                if(mult >= cp) {
                    clearInterval(timer); isLive = false; document.getElementById('mult-text').innerText = "BUST!";
                    document.getElementById('history-bar').insertAdjacentHTML('afterbegin', `<div class="hist-item hist-loss">L: -${bet}</div>`);
                    setTimeout(() => { document.getElementById('btn-start').style.display='block'; document.getElementById('btn-cash').style.display='none'; resetP(); }, 2000);
                    save();
                }
            }, 100);
        }

        function cashG() {
            if(!isLive) return; clearInterval(timer); isLive = false;
            let w = Math.floor(bet * mult); bal += w; refresh();
            document.getElementById('mult-text').innerText = "WIN Rs " + w;
            document.getElementById('history-bar').insertAdjacentHTML('afterbegin', `<div class="hist-item hist-win">W: +${w}</div>`);
            setTimeout(() => { document.getElementById('btn-start').style.display='block'; document.getElementById('btn-cash').style.display='none'; resetP(); }, 2000);
            save();
        }

        function resetP() { 
            let p = document.getElementById('plane-icon'); p.style.bottom="20px"; p.style.left="10%"; p.style.opacity="1";
            document.getElementById('mult-text').innerText="1.00x"; 
        }
    </script>
</body>
</html>
